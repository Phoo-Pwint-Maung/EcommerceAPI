spring.application.name=EcommerceAPI

# Added ?options=-c%20timezone=UTC to the end of the URL
spring.datasource.url=jdbc:postgresql://localhost:5332/amigoscode?options=-c%20TimeZone=UTC
spring.datasource.username=amigoscode
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly tell Hibernate which database version to use
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.hikari.data-source-properties.timezone=UTC
spring.datasource.hikari.data-source-properties.serverTimezone=UTC